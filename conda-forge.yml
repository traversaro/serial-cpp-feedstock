  error_overlinking: true
conda_forge_output_validation: true
conda_install_tool: pixi
provider:
  linux_aarch64: default
  osx_arm64: default
  win_arm64: default
build_platform:
  linux_aarch64: linux_aarch64
  osx_arm64: osx_arm64
